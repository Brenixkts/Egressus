<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="../css/cad.css">
    <title>Document</title>
</head>
<body>
    <!--Início do formulario-->
    <div class="container">
        <div class="main-content">
            <div class="form-header">
                <img src="../img/logo 2.png" alt="">
                 <br>
             </div>
            <form action="#">
                <!--Cabeçalho do formulário de cadastro-->
                <div class="form-content">
                <!--Seção de inputs-->    
                    <div class="form-input">
                        <label for="inst-ensino">Nome da Instituição</label>
                        <input type="text" class="inst-ensino" required placeholder="Digite o nome da Instituição de Ensino">
                    </div>
                    <div class="form-input">
                        <label for="endereço">Endereço</label>
                        <input type="text" class="endereço" required placeholder="Digite o endereço">
                    </div>
                    <div class="form-input">
                        <label for="bairro">Bairro</label>
                        <input type="text" class="airro" required placeholder="Digite o bairro">
                    </div>
                    <div class="form-input">
                        <label for="cep">Cep</label>
                        <input type="number" class="cep" required placeholder="Digite cep">
                    </div>
                    <div class="form-input">
                        <label for="cidade">Cidade</label>
                        <input type="text" class="cidade" required placeholder="Digite a cidade">
                    </div>
                    <div class="form-input">
                        <label for="uf">UF</label>
                        <input type="text" class="uf" required placeholder="Digite o estado">
                    </div>
                    <div class="form-input">
                        <label for="telefone">Telefone (1)</label>
                        <input type="number" class="telefone" required placeholder="(xx) xxxx-xxxx">
                    </div>
                    <div class="form-input">
                        <label for="telefone">Telefone (2)</label>
                        <input type="number" class="telefone" placeholder="(xx) xxxx-xxxx">
                    </div>
                    <div class="form-input">
                        <label for="telefone">Telefone (3)</label>
                        <input type="number" class="telefone" placeholder="(xx) xxxx-xxxx">
                    </div>
                    <div class="form-input">
                        <label for="email">Email</label>
                        <input type="email" class="email" placeholder="Digite o seu email">
                    </div>
                    
                    <div class="form-input">
                        <label for="logo">Logomarca</label>
                        <input type="file" class="logo-IE">
                    </div>
                    <br>

                </div>
                <div class="submit-button">
                    <button>Cadastrar</button>
                </div>
                <div class="login-redirect">
                    <span>Já tem uma conta? <a href="../pages/login.html">Entre aqui</a></span>
                </div>
                <div class="login-redirect">
                    <span>Deseja cadastrar um usuário? <a href="../pages/cadEgresso.html">Vamos lá!</a></span>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
